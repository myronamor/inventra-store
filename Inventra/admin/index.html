<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventra Store</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">Inventra Store</h1>
      <div>
        <a href="index.html" class="px-3">Home</a>
        <a href="products.html" class="px-3">Products</a>
        <a href="checkout.html" class="px-3">Checkout</a>
        <a href="contact.html" class="px-3">Contact</a>
        <a href="admin/index.html" class="px-3">Admin</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="bg-indigo-600 text-white py-16 text-center">
    <h2 class="text-4xl font-bold">Welcome to Inventra Store</h2>
    <p class="mt-4 text-lg">Premium Accounts & Gaming Subscriptions at the Best Prices</p>
  </section>

  <!-- Product Grid -->
  <section class="max-w-7xl mx-auto px-4 py-12">
    <h3 class="text-2xl font-semibold mb-6">Featured Products</h3>
    <div id="product-grid" class="grid md:grid-cols-3 gap-6">
      <!-- Products load dynamically -->
    </div>
  </section>

  <script src="assets/js/products.js"></script>
</body>
</html>
